name: 毎日AI記事自動生成

on:
  schedule:
    # 毎日 朝9時(JST) = UTC 0時
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 記事を3本生成
        run: |
          for keyword in "ChatGPT 最新情報 2026" "AI 業務効率化 事例" "生成AI 使い方 初心者"; do
            echo "生成中: $keyword"
            curl -s -X POST "${{ secrets.SITE_URL }}/api/generate" \
              -H "Content-Type: application/json" \
              -d "{\"keyword\":\"$keyword\",\"autoPublish\":true}" | \
              python3 -c "import sys,json; r=json.load(sys.stdin); print('✅' if r.get('article') else '❌', r.get('article',{}).get('title','ERROR'))"
            sleep 5
          done
